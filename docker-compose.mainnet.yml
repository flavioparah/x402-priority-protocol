# Third deployment of the x402 Shield: real Solana mainnet, exposed at
# https://x402-mainnet.rpcpriority.com.
#
# Purpose: a publicly-reachable URL where any investor, partner or judge
# can run the full on-chain payment flow against REAL mainnet — proving
# end-to-end that the protocol works on production network with real SOL.
#
# Differs from docker-compose.devnet.yml only in REAL_RPC_URL: instead of
# devnet, this points at api.mainnet-beta.solana.com. Trust-deposit is OFF
# (forces on-chain verification), same as devnet.
#
# Deploy alongside the other two containers — they share `portainer_default`
# and are routed by Traefik on different subdomains.
#
#   docker-compose -f docker-compose.mainnet.yml up -d --build
#
# Required env vars (set in /root/x402/.env on kvm4):
#   PAYMENT_DESTINATION_MAINNET  - Solana pubkey to receive REAL mainnet payments
#                                  (must be a wallet whose private key is in a
#                                   secure place — payments arrive in real SOL)

services:
  redis-mainnet:
    image: redis:7-alpine
    container_name: x402-redis-mainnet
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - x402-redis-mainnet-data:/data
    networks:
      - portainer_default

  x402-shield-mainnet:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: x402-shield-mainnet
    restart: unless-stopped
    depends_on:
      - redis-mainnet
    environment:
      PORT: 3000
      REDIS_URL: redis://redis-mainnet:6379
      REAL_RPC_URL: https://api.mainnet-beta.solana.com
      SOLANA_RPC_URL: https://api.mainnet-beta.solana.com
      PAYMENT_DESTINATION: ${PAYMENT_DESTINATION_MAINNET}
      DEPOSIT_COMMITMENT: ${DEPOSIT_COMMITMENT:-confirmed}
      # Whole point of this deployment: REAL on-chain verification, no shortcuts.
      ESCROW_TRUST_DEPOSITS: ""
      RPC_LOAD_THRESHOLD: ${RPC_LOAD_THRESHOLD:-0.5}
      RPC_LOAD_FORCE: ${RPC_LOAD_FORCE_MAINNET:-0.9}
      MAX_RPS: ${MAX_RPS:-50}
      LOAD_WINDOW_MS: ${LOAD_WINDOW_MS:-5000}
      REQUESTS_PER_IP_LIMIT: ${REQUESTS_PER_IP_LIMIT:-100}
      RATE_WINDOW_MS: ${RATE_WINDOW_MS:-60000}
      BASE_PRICE: ${BASE_PRICE:-1000}
      MAX_PRICE: ${MAX_PRICE:-50000}
    networks:
      - portainer_default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.x402-shield-mainnet.rule=Host(`x402-mainnet.rpcpriority.com`)"
      - "traefik.http.routers.x402-shield-mainnet.entrypoints=websecure"
      - "traefik.http.routers.x402-shield-mainnet.tls.certresolver=leresolver"
      - "traefik.http.services.x402-shield-mainnet.loadbalancer.server.port=3000"

networks:
  portainer_default:
    external: true

volumes:
  x402-redis-mainnet-data:
