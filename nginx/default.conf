server {
    listen       80;
    listen  [::]:80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Resolve extensionless URLs to .html files so that /try, /live, /explorer
    # serve try.html, live.html, explorer.html respectively. Falls through to
    # directory index, then 404.
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # PWA manifest — nginx default mime.types ships without .webmanifest.
    # Override only this extension; everything else inherits global types.
    location ~* \.webmanifest$ {
        default_type application/manifest+json;
        add_header Cache-Control "public";
        expires 1h;
    }

    # Cache static assets briefly so the dashboard polls feel snappy without
    # blocking quick iteration.
    location ~* \.(?:html)$ {
        add_header Cache-Control "no-cache, must-revalidate";
    }
    location ~* \.(?:css|js|png|jpg|jpeg|svg|gif|webp|ico|woff2?)$ {
        expires 1h;
        add_header Cache-Control "public";
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html { root /usr/share/nginx/html; }
}
