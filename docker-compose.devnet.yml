# x402 Shield — Solana devnet deployment.
# Exposed at https://devnet.rpcpriority.com.
#
# Same on-chain verification flow as mainnet, but pointed at devnet so it can
# be exercised end-to-end without spending real SOL. Trusted-deposit is OFF.
#
# Deploy alongside mainnet/demo/landing containers — they share `portainer_default`
# and Traefik routes by Host header.
#
#   docker compose -f docker-compose.devnet.yml up -d --build
#
# Required env vars (set in /root/x402/.env on kvm4):
#   PAYMENT_DESTINATION_DEVNET   - Solana pubkey to receive devnet payments
#                                  (can be the same address as mainnet — Solana
#                                  addresses are universal across clusters).
#
# Optional overrides (default to demo-friendly values):
#   RPC_LOAD_FORCE_DEVNET=0.9    - force 402 on every request for demo
#   BASE_PRICE / MAX_PRICE       - pricing band (µ-lamports)

services:
  redis-devnet:
    image: redis:7-alpine
    container_name: x402-redis-devnet
    restart: unless-stopped
    # volatile-lru only evicts TTL keys (nonces); escrow / reputation /
    # signatures are immune to memory-pressure eviction.
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy volatile-lru
    volumes:
      - x402-redis-devnet-data:/data
    networks:
      - portainer_default

  x402-shield-devnet:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: x402-shield-devnet
    restart: unless-stopped
    depends_on:
      - redis-devnet
    environment:
      PORT: 3000
      REDIS_URL: redis://x402-redis-devnet:6379
      REAL_RPC_URL: https://api.devnet.solana.com
      SOLANA_RPC_URL: https://api.devnet.solana.com
      PAYMENT_DESTINATION: ${PAYMENT_DESTINATION_DEVNET:-${PAYMENT_DESTINATION}}
      DEPOSIT_COMMITMENT: ${DEPOSIT_COMMITMENT:-confirmed}
      # Whole point of this deployment: on-chain verification, no shortcuts.
      ESCROW_TRUST_DEPOSITS: ""
      RPC_LOAD_THRESHOLD: ${RPC_LOAD_THRESHOLD:-0.75}
      RPC_LOAD_FORCE: ${RPC_LOAD_FORCE_DEVNET:-0.9}
      MAX_RPS: ${MAX_RPS:-50}
      LOAD_WINDOW_MS: ${LOAD_WINDOW_MS:-5000}
      REQUESTS_PER_IP_LIMIT: ${REQUESTS_PER_IP_LIMIT:-100}
      RATE_WINDOW_MS: ${RATE_WINDOW_MS:-60000}
      BASE_PRICE: ${BASE_PRICE:-1000}
      MAX_PRICE: ${MAX_PRICE:-50000}
    networks:
      - portainer_default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.x402-shield-devnet.rule=Host(`devnet.rpcpriority.com`)"
      - "traefik.http.routers.x402-shield-devnet.entrypoints=websecure"
      - "traefik.http.routers.x402-shield-devnet.tls.certresolver=leresolver"
      - "traefik.http.services.x402-shield-devnet.loadbalancer.server.port=3000"

networks:
  portainer_default:
    external: true

volumes:
  x402-redis-devnet-data:
